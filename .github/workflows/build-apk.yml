name: Build KoraScoreLive APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - show files
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== All files recursive ==="
          find . -name "*.yaml" -o -name "*.dart" | head -30

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project and merge
        run: |
          flutter create /tmp/kora_app --project-name kora_score_live --org com.korascorelive --platforms android
          rm -rf /tmp/kora_app/lib
          cp -r $(find . -name "lib" -type d | head -1) /tmp/kora_app/lib
          PUBSPEC=$(find . -name "pubspec.yaml" | grep -v "/tmp" | head -1)
          echo "Found pubspec at: $PUBSPEC"
          cp "$PUBSPEC" /tmp/kora_app/pubspec.yaml

      - name: Get dependencies
        working-directory: /tmp/kora_app
        run: flutter pub get

      - name: Build Debug APK
        working-directory: /tmp/kora_app
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KoraScoreLive-APK
          path: /tmp/kora_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
