name: Build KoraScoreLive APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Backup custom files
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml

      - name: Create Flutter project structure
        run: flutter create . --project-name kora_score_live --org com.korascorelive --platforms android

      - name: Restore custom files
        run: |
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KoraScoreLive-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
